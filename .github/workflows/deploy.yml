name: Deploy to Streamlit Cloud

on:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'core/**'
      - 'models/**'
      - 'data/**'
      - 'ui/**'
      - 'services/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Streamlit Cloud
    runs-on: ubuntu-latest
    if: github.repository == 'JeremyTheNoob/fund_analyst'

    steps:
    - uses: actions/checkout@v3

    - name: Run smoke tests before deployment
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python tests/smoke_test.py
      env:
        CI: true

    - name: Deploy to Streamlit Cloud
      uses: ./.github/actions/deploy-streamlit
      if: success()
      with:
        app-url: https://fundanalyst-supq2s7qdckbk9468a83bc.streamlit.app/
        token: ${{ secrets.STREAMLIT_TOKEN }}

    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment successful!"
        else
          echo "❌ Deployment failed!"
          exit 1
        fi
